name: Auto Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # 允许手动触发

env:
  GIT_BRANCH: main  # 你的 git 分支名称

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install server dependencies
        working-directory: apps/server/my-blog
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/server/my-blog
        run: pnpm exec prisma generate

      - name: Run tests
        working-directory: apps/server/my-blog
        run: pnpm test --no-coverage

  deploy:
    runs-on: ubuntu-latest
    needs: test  # deploy 仅在 test 通过后执行
    timeout-minutes: 30

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          fingerprint: ${{ secrets.SSH_FINGERPRINT }}
          script_stop: true
          request_pty: true  # 启用 PTY 以支持彩色的日志输出
          script: |
            set -e  # 遇到错误立即退出

            cd /root/myblog

            # 拉取最新代码
            echo "=== 拉取最新代码 ==="
            git fetch origin
            git reset --hard origin/${{ env.GIT_BRANCH }}
            git clean -fd
            echo "当前 commit: $(git rev-parse --short HEAD)"

            # 执行部署脚本（跳过 git 操作，CI 已处理）
            echo "=== 开始部署 ==="
            chmod +x deploy.sh
            SKIP_GIT=true ./deploy.sh

            echo "=== 部署完成 ==="
            pm2 list
