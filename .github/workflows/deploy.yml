name: Build & Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'
  DEPLOY_DIR: /home/myblog
  # prisma generate 和 build 阶段不需要真实数据库连接
  DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/placeholder'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install & test server
        working-directory: apps/server/my-blog
        run: |
          pnpm install --frozen-lockfile
          pnpm exec prisma generate
          pnpm test --no-coverage

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      # ── 构建后端 (NestJS) ──
      - name: Build server
        working-directory: apps/server/my-blog
        run: |
          pnpm install --frozen-lockfile
          pnpm exec prisma generate
          NODE_OPTIONS="--max-old-space-size=4096" pnpm run build

          # 验证构建产物
          ls dist/src/main.js

      # ── 构建管理后台 (Ant Design Pro) ──
      - name: Build admin
        working-directory: apps/admin-web/myapp
        run: |
          pnpm install --frozen-lockfile
          NODE_OPTIONS="--max-old-space-size=4096" NODE_ENV=production UMI_ENV=prod pnpm run build

      # ── 构建博客前端 (Next.js standalone) ──
      - name: Build blog
        working-directory: apps/blog-web/blog_web
        run: |
          pnpm install --frozen-lockfile
          NODE_OPTIONS="--max-old-space-size=4096" pnpm run build

      - name: Package blog standalone
        working-directory: apps/blog-web/blog_web
        run: |
          mkdir -p _deploy

          # Next.js standalone 产物路径（可能是根目录或嵌套路径）
          STANDALONE_DIR=".next/standalone"

          # 检查 standalone 目录结构，找到 server.js 所在位置
          if [ -f "$STANDALONE_DIR/server.js" ]; then
            cp -r $STANDALONE_DIR/. _deploy/
          elif [ -f "$STANDALONE_DIR/apps/blog-web/blog_web/server.js" ]; then
            # monorepo 场景下 standalone 可能嵌套
            cp -r $STANDALONE_DIR/. _deploy/
          else
            echo "=== standalone 目录结构 ==="
            find $STANDALONE_DIR -maxdepth 3 -type f -name "server.js" || true
            ls -la $STANDALONE_DIR/
            echo "错误：找不到 standalone server.js"
            exit 1
          fi

          # standalone 模式需要 static 和 public 资源
          mkdir -p _deploy/.next/static
          cp -r .next/static/. _deploy/.next/static/
          if [ -d "public" ]; then
            cp -r public _deploy/public
          fi

          # 验证关键文件存在
          echo "=== 验证 standalone 产物 ==="
          ls -la _deploy/server.js 2>/dev/null || ls -la _deploy/apps/blog-web/blog_web/server.js 2>/dev/null || echo "WARN: server.js 位置待确认"

      # ── 打包产物 ──
      - name: Create deploy archive
        run: |
          mkdir -p _artifacts

          # 后端产物（--dereference 跟随 pnpm 符号链接，打包真实文件）
          tar -czf _artifacts/server.tar.gz --dereference \
            -C apps/server/my-blog \
            dist prisma node_modules package.json prisma.config.ts

          # 管理后台产物（纯静态）
          tar -czf _artifacts/admin.tar.gz -C apps/admin-web/myapp dist

          # 博客前端产物（standalone）
          tar -czf _artifacts/blog.tar.gz -C apps/blog-web/blog_web/_deploy .

          # 部署脚本
          cp deploy-remote.sh _artifacts/

          echo "=== 产物大小 ==="
          ls -lh _artifacts/

      # ── 上传到服务器 ──
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload artifacts
        run: |
          SCP_OPTS="-i ~/.ssh/deploy_key -P ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no"
          SSH_OPTS="-i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no"

          # 在服务器上创建临时目录
          ssh $SSH_OPTS ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p /tmp/blog-deploy"

          # 上传所有产物（scp 用大写 -P 指定端口）
          scp $SCP_OPTS _artifacts/* ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/blog-deploy/

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          fingerprint: ${{ secrets.SSH_FINGERPRINT }}
          script_stop: true
          request_pty: true
          script: |
            set -e
            chmod +x /tmp/blog-deploy/deploy-remote.sh
            /tmp/blog-deploy/deploy-remote.sh
            rm -rf /tmp/blog-deploy
